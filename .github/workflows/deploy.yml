name: Deploy Landing

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync hashed assets (JS/CSS/media) with long-lived cache
        run: |
          aws s3 sync dist/assets s3://mediciro.ro/assets \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync index.html and other root files with no-cache
        run: |
          aws s3 sync dist s3://mediciro.ro \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EY0QN6DFDGRHJ \
            --paths "/*"
